<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>00老师课堂</title>
  <link rel="icon" href="https://8zs8.github.io/8/logo.png">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;user-select:none;-webkit-user-select:none}
    body{width:100vw;height:100vh;overflow:hidden;background:#03050a;--hue:200}

    #loading-screen{
      position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:space-between;
      background:#000510;padding:20px 16px;
      opacity:1;transition:opacity .5s ease;
    }
    #loading-screen.fade-out{opacity:0}
    .loading-image-wrapper{
      z-index:3;margin-top:4vh;max-width:min(1000px,95vw);width:100%;
      display:flex;justify-content:center;align-items:flex-start;flex:1
    }
    .loading-image{
      max-width:100%;max-height:60vh;height:auto;width:auto;
      border-radius:16px;box-shadow:0 8px 32px rgba(0,200,255,.35),0 0 0 1px rgba(0,180,255,.2);
      object-fit:contain;opacity:0;animation:imgFade .8s ease forwards
    }
    @keyframes imgFade{from{opacity:0;transform:translateY(-10px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    .loading-center{
      display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3
    }
    .loading-bottom{
      display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
      width:100%;margin-bottom:4vh;z-index:3
    }
    .dot-grid{
      position:absolute;top:0;left:0;width:100%;height:100%;
      display:grid;grid-template-columns:repeat(15,1fr);grid-template-rows:repeat(10,1fr);
      gap:12px;padding:12px;z-index:1;opacity:.35
    }
    .dot{
      width:100%;aspect-ratio:1/1;border-radius:2px;
      animation:color 6s linear infinite alternate;opacity:0.7
    }
    @keyframes color{0%{background:#00ccff}33%{background:#ff4da6}66%{background:#39ff99}100%{background:#ffe047}}

    /* 动态渐变 - 基于 --hue */
    @keyframes hueShift{
      from{--hue:0}to{--hue:360}
    }
    .loading-text{font-size:clamp(1.2rem,4vw,2.2rem);margin-bottom:1.5rem;z-index:3;font-weight:800;letter-spacing:1px;
      background:linear-gradient(90deg,hsl(var(--hue),100%,85%),hsl(calc(var(--hue)+60),100%,90%));
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
      text-shadow:0 2px 4px rgba(0,0,0,.85), 0 1px 1px rgba(0,0,0,.7);
      filter:drop-shadow(0 0 3px hsla(var(--hue),100%,60%,.75)) drop-shadow(0 0 1px hsla(var(--hue),100%,70%,.5))
    }
    .loading-bar{width:clamp(200px,50vw,500px);height:16px;border:1px solid hsl(var(--hue),100%,60%);border-radius:999px;overflow:hidden;background:rgba(0,20,40,.8);z-index:3;margin-top:1rem;
      box-shadow:0 1px 4px rgba(0,0,0,.6), inset 0 1px 2px rgba(0,0,0,.4)}
    .loading-progress{height:100%;width:0%;background:linear-gradient(90deg,hsl(var(--hue),85%,45%),hsl(calc(var(--hue)+60),85%,55%));transition:width 0.03s linear;border-radius:999px}
    .loading-step{margin-top:1rem;color:hsl(var(--hue),70%,90%);font-size:1rem;z-index:3;font-weight:700;
      text-shadow:0 1px 2px rgba(0,0,0,.9), 0 0 1px rgba(0,0,0,.5);letter-spacing:.5px}

    .enter-buttons{
      display:flex;gap:20px;align-items:center;justify-content:center;
      margin-top:1rem;flex-wrap:wrap
    }
    .enter-btn{
      padding:14px 34px;border-radius:14px;border:none;cursor:pointer;
      text-decoration:none;display:inline-flex;align-items:center;justify-content:center;
      font-size:18px;font-weight:800;letter-spacing:1.5px;min-width:180px;
      transition:transform .2s ease,box-shadow .3s ease;
    }
    .enter-btn-primary{
      background:linear-gradient(135deg,hsl(var(--hue),85%,45%),hsl(calc(var(--hue)+60),85%,55%),hsl(calc(var(--hue)+120),85%,50%));
      color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.9), 0 1px 1px rgba(0,0,0,.7);
      border:2px solid hsl(calc(var(--hue)+45),100%,70%);
      box-shadow:0 2px 8px rgba(0,0,0,.5), 0 0 16px hsla(var(--hue),100%,55%,.55),inset 0 1px 0 rgba(255,255,255,.15);
    }
    .enter-btn-primary:hover{transform:translateY(-2px) scale(1.03);
      box-shadow:0 4px 14px rgba(0,0,0,.55), 0 0 24px hsla(var(--hue),100%,60%,.8),inset 0 1px 0 rgba(255,255,255,.2);
    }
    .enter-btn-secondary{
      background:linear-gradient(135deg,hsla(var(--hue),70%,28%,.95),hsla(calc(var(--hue)+60),80%,40%,.95));
      color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.9), 0 1px 1px rgba(0,0,0,.7);
      border:2px solid hsl(var(--hue),100%,60%);
      box-shadow:0 2px 6px rgba(0,0,0,.5), 0 0 12px hsla(var(--hue),100%,50%,.4);
    }
    .enter-btn-secondary:hover{transform:translateY(-2px) scale(1.03);
      box-shadow:0 4px 12px rgba(0,0,0,.55), 0 0 20px hsla(var(--hue),100%,60%,.7);
    }

    .result-modal{
      position:fixed;top:0;left:0;width:100vw;height:100vh;
      background:rgba(0,10,20,0.85);backdrop-filter:blur(6px);
      z-index:999;display:none;align-items:center;justify-content:center;
    }
    .result-box{
      background:linear-gradient(135deg,
        hsl(var(--hue),70%,18%),
        hsl(calc(var(--hue) + 40),75%,28%));
      border:3px solid hsl(var(--hue),100%,60%);
      border-radius:20px;
      padding:30px 40px;max-width:90vw;
      text-align:center;
      box-shadow:0 0 30px hsla(var(--hue),100%,55%,.6),
                 inset 0 0 20px hsla(var(--hue),100%,50%,.15);
    }
    .result-title{
      font-size:28px;
      background:linear-gradient(90deg,
        hsl(var(--hue),100%,80%),
        hsl(calc(var(--hue) + 60),100%,80%));
      -webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;color:transparent;
      filter:drop-shadow(0 0 6px hsla(var(--hue),100%,60%,.7));
      margin-bottom:20px;
    }
    .result-names{
      font-size:22px;
      background:linear-gradient(90deg,
        hsl(var(--hue),100%,85%),
        hsl(calc(var(--hue) + 45),100%,85%),
        hsl(calc(var(--hue) + 90),100%,85%));
      -webkit-background-clip:text;background-clip:text;
      -webkit-text-fill-color:transparent;color:transparent;
      filter:drop-shadow(0 0 4px hsla(var(--hue),100%,60%,.6));
      font-weight:bold;
      white-space:normal;word-wrap:break-word;overflow-wrap:break-word;
      line-height:1.6;
    }
    .result-names span{display:inline-block;margin:4px 8px;padding:6px 14px;
      background:linear-gradient(135deg,
        hsla(var(--hue),70%,30%,.55),
        hsla(calc(var(--hue) + 45),80%,40%,.55));
      border:1px solid hsla(var(--hue),100%,65%,.6);
      border-radius:12px;
      box-shadow:0 0 10px hsla(var(--hue),100%,55%,.3);
    }
    .close-btn{
      margin-top:25px;padding:10px 22px;
      background:linear-gradient(135deg,
        hsl(var(--hue),85%,45%),
        hsl(calc(var(--hue) + 60),85%,50%));
      color:#fff;font-size:16px;font-weight:bold;
      border:none;border-radius:12px;cursor:pointer;
      box-shadow:0 0 12px hsla(var(--hue),100%,55%,.5);
      transition:transform .15s ease, box-shadow .3s ease;
    }
    .close-btn:hover{transform:scale(1.04);
      box-shadow:0 0 18px hsla(var(--hue),100%,60%,.8);
    }

    .settings-btn{
      position:fixed;top:20px;right:20px;width:50px;height:50px;
      background:linear-gradient(135deg,hsl(var(--hue),70%,30%),hsl(calc(var(--hue) + 40),80%,45%));
      color:#fff;border-radius:50%;
      font-size:24px;display:flex;align-items:center;justify-content:center;
      cursor:pointer;z-index:99;border:2px solid hsl(var(--hue),100%,60%);
      box-shadow:0 0 12px hsla(var(--hue),100%,60%,.5);
    }
    .settings-panel{
      position:fixed;top:80px;right:20px;width:280px;
      background:rgba(10,20,40,.95);backdrop-filter:blur(10px);
      border:2px solid hsl(var(--hue),100%,60%);border-radius:16px;padding:16px;
      display:none;flex-direction:column;gap:12px;z-index:99;
      color:#fff;font-size:15px;box-shadow:0 0 20px hsla(var(--hue),100%,50%,.4);
    }
    .settings-panel.show{display:flex}
    .settings-row{display:flex;justify-content:space-between;align-items:center}
    .settings-label{font-weight:bold;
      background:linear-gradient(90deg,hsl(var(--hue),100%,75%),hsl(calc(var(--hue) + 60),100%,75%));
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
      filter:drop-shadow(0 0 4px rgba(0,200,255,.3));
    }
    .settings-toggle{width:50px;height:26px;background:#333;border-radius:13px;position:relative;cursor:pointer;
      transition:background .3s ease;box-shadow:inset 0 0 4px rgba(0,0,0,.5)}
    .settings-toggle::after{content:'';position:absolute;width:22px;height:22px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.3s}
    .settings-toggle.on{background:linear-gradient(90deg,hsl(var(--hue),85%,45%),hsl(calc(var(--hue) + 60),85%,55%))}
    .settings-toggle.on::after{left:26px;box-shadow:0 0 8px rgba(255,255,255,.7)}

    .num-group{
      display:flex;align-items:center;gap:4px;
    }
    .num-btn{
      width:28px;height:28px;
      background:linear-gradient(135deg,hsl(var(--hue),70%,35%),hsl(calc(var(--hue) + 60),80%,50%));
      color:#fff;border:none;border-radius:8px;
      font-size:16px;font-weight:bold;cursor:pointer;
      box-shadow:0 0 8px hsla(var(--hue),100%,50%,.4);
    }
    .num-btn:hover{transform:scale(1.08);transition:transform .15s}
    .num-input{
      width:50px;padding:6px 4px;border-radius:8px;border:1px solid hsl(var(--hue),100%,60%);
      background:#112;color:#fff;text-align:center;
    }

    /* 首次启动引导提示框 - 对齐到设置按钮正下方 + 渐变 */
    .guide-tip{
      position:fixed;top:82px;right:18px;
      background:linear-gradient(135deg,
        hsl(var(--hue),70%,22%),
        hsl(calc(var(--hue) + 45),80%,35%));
      color:#fff;
      padding:12px 16px;
      border-radius:12px;
      border:2px solid hsl(var(--hue),100%,65%);
      box-shadow:0 0 16px hsla(var(--hue),100%,55%,.55),
                 inset 0 0 10px hsla(var(--hue),100%,50%,.15);
      z-index:1000;display:none;
      width:240px;
    }
    .guide-tip::after{
      content:'';position:absolute;top:-10px;right:26px;
      width:0;height:0;
      border-left:9px solid transparent;border-right:9px solid transparent;
      border-bottom:10px solid hsl(var(--hue),100%,65%);
      filter:drop-shadow(0 -2px 2px hsla(var(--hue),100%,55%,.4));
    }
    .guide-close{
      margin-top:8px;width:100%;padding:6px 0;border:none;border-radius:8px;
      background:linear-gradient(90deg,
        hsl(var(--hue),85%,45%),
        hsl(calc(var(--hue) + 60),85%,55%));
      color:#fff;font-weight:bold;cursor:pointer;
      box-shadow:0 0 10px hsla(var(--hue),100%,55%,.4);
      transition:transform .15s ease, box-shadow .3s ease;
    }
    .guide-close:hover{transform:scale(1.02);
      box-shadow:0 0 14px hsla(var(--hue),100%,60%,.7);
    }

    #canvas-container{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2}
    .ui-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:clamp(1rem,3vw,2rem);pointer-events:none}
    
    .title{
      font-size:clamp(1.5rem,6vw,4rem);
      background:linear-gradient(90deg,hsl(var(--hue),100%,75%),hsl(calc(var(--hue) + 60),100%,75%),hsl(calc(var(--hue) + 120),100%,75%));
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
      filter:drop-shadow(0 0 8px hsla(var(--hue),100%,50%,.6));
      border-bottom:2px solid hsl(var(--hue),100%,60%);
      padding-bottom:.2em;text-align:center;text-transform:uppercase;letter-spacing:2px;
      transition:background 2s linear;
    }
    .center-name{flex:1;display:flex;align-items:center;justify-content:center;width:100%;position:relative}
    #selectedNameAnimator{
      position:absolute;font-size:clamp(12px,2.5vw,16px);font-weight:600;
      color:#fff;
      text-shadow:0 0 8px cyan,0 0 12px #0077ff;opacity:0;transition:all 2.4s cubic-bezier(.2,.8,.2,1);z-index:100
    }
    #selectedNameAnimator.animate-to-center{
      font-size:clamp(6vw,12vw,16vw)!important;font-weight:900;
      background:linear-gradient(90deg,hsl(var(--hue),100%,85%),hsl(calc(var(--hue) + 60),100%,85%));
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
      filter:drop-shadow(0 0 20px hsla(var(--hue),100%,60%,.8));
      left:50%!important;top:50%!important;transform:translate(-50%,-50%)!important;opacity:1
    }

    .control-panel{
      width:100%;max-width:800px;
      background:rgba(10,20,40,.8);backdrop-filter:blur(8px);
      border:1px solid hsl(var(--hue),100%,60%);border-radius:clamp(20px,5vw,40px);
      padding:clamp(1rem,3vw,1.5rem);pointer-events:auto;
      box-shadow:0 0 20px hsla(var(--hue),100%,50%,.25);
    }
    .mode-select{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:15px}
    .mode-btn{padding:10px;border-radius:12px;border:2px solid hsl(var(--hue),100%,60%);
      background:linear-gradient(135deg,hsla(var(--hue),70%,25%,.8),hsla(calc(var(--hue) + 40),80%,40%,.8));
      color:#fff;font-weight:bold;font-size:16px;cursor:pointer;transition:all .2s ease;
      text-shadow:0 1px 2px rgba(0,0,0,.6);
    }
    .mode-btn.active{
      background:linear-gradient(135deg,hsl(var(--hue),90%,50%),hsl(calc(var(--hue) + 60),90%,55%));
      border-color:#fff;color:#fff;box-shadow:0 0 12px hsla(var(--hue),100%,60%,.7);
    }
    .action-btn{
      width:100%;padding:clamp(.8rem,3vw,1.2rem);
      font-size:clamp(1.2rem,5vw,2rem);font-weight:800;color:#fff;
      text-shadow:0 1px 3px rgba(0,0,0,.6),0 0 15px hsla(var(--hue),100%,70%,.6);
      background:linear-gradient(135deg,hsl(var(--hue),85%,40%),hsl(calc(var(--hue) + 45),85%,55%),hsl(calc(var(--hue) + 90),85%,50%));
      border:3px solid hsl(calc(var(--hue) + 45),100%,70%);
      border-radius:clamp(30px,8vw,60px);
      cursor:pointer;box-shadow:0 0 20px hsla(var(--hue),100%,55%,.55),inset 0 0 15px rgba(0,0,0,.25);
      text-transform:uppercase;letter-spacing:2px;transition:transform .15s ease, box-shadow .4s ease, background 2s linear;
    }
    .action-btn:hover{transform:scale(1.015)}
    .name-tag{
      font-size:clamp(12px,2.5vw,16px);font-weight:600;color:#fff;
      text-shadow:0 0 6px hsla(var(--hue),100%,60%,.8);
      background:linear-gradient(135deg,hsla(var(--hue),60%,18%,.85),hsla(calc(var(--hue) + 45),70%,30%,.85));
      padding:2px 8px;border-radius:15px;border:1px solid hsla(var(--hue),100%,65%,.7);
      white-space:nowrap;pointer-events:none;
      box-shadow:0 0 8px hsla(var(--hue),100%,55%,.35);
    }
    .footer-info{font-size:clamp(.8rem,2vw,1.1rem);
      background:linear-gradient(90deg,hsl(var(--hue),80%,75%),hsl(calc(var(--hue) + 60),80%,75%));
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
      text-align:center;margin-top:.5rem;opacity:.95;filter:drop-shadow(0 0 2px rgba(0,150,255,.3));
    }
  </style>
</head>
<body>

<div id="loading-screen">
  <div class="dot-grid"></div>
  <div class="loading-image-wrapper">
    <img class="loading-image" src="https://8zs8.github.io/8/ad.png" alt="00老师课堂">
  </div>
  <div class="loading-center" id="loading-center">
    <div class="loading-text">初始化点名系统</div>
  </div>
  <div class="loading-bottom" id="loading-bottom">
    <div class="loading-bar"><div class="loading-progress" id="loadingProgress"></div></div>
    <div class="loading-step" id="loadingStep">加载中.</div>
  </div>
</div>

<div class="result-modal" id="resultModal">
  <div class="result-box">
    <div class="result-title">本次抽中名单</div>
    <div class="result-names" id="resultNames"></div>
    <button class="close-btn" onclick="closeResult()">关闭</button>
  </div>
</div>

<!-- 每次启动引导提示 -->
<div class="guide-tip" id="guideTip">
  <div>这里可以调整抽中人数啦</div>
  <button class="guide-close" onclick="closeGuide()">知道了</button>
</div>

<div class="settings-btn">⚙️</div>
<div class="settings-panel">
  <div class="settings-row">
    <div class="settings-label">多重随机</div>
    <div class="settings-toggle on" id="multiRand"></div>
  </div>
  <div class="settings-row">
    <div class="settings-label">智能去重</div>
    <div class="settings-toggle on" id="noRepeat"></div>
  </div>
  <div class="settings-row">
    <div class="settings-label">全屏模式</div>
    <div class="settings-toggle on" id="fullscreenToggle"></div>
  </div>
  <div class="settings-row">
    <div class="settings-label">一次抽中人数</div>
    <div class="num-group">
      <button class="num-btn" id="minus">-</button>
      <input type="text" class="num-input" id="pickCount" value="1" maxlength="2">
      <button class="num-btn" id="plus">+</button>
    </div>
  </div>
</div>

<div id="canvas-container" style="display:none;"></div>
<div class="ui-overlay" style="display:none;"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>

<script>
// 防篡改
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if((e.ctrlKey&&e.key==='u')||(e.ctrlKey&&e.shiftKey&&e.key==='i')||e.key==='F12') e.preventDefault();
});

// Feature 4: 持续颜色缓慢变化（基于 --hue 变量）
(function(){
  let hue = 200;
  let targetHue = hue + 60 + Math.random() * 60;
  const body = document.body;
  function step(){
    const diff = ((targetHue - hue) % 360 + 540) % 360 - 180;
    hue += diff * 0.012;
    if (Math.abs(diff) < 2) targetHue = hue + 80 + Math.random() * 120;
    body.style.setProperty('--hue', hue.toFixed(2));
    requestAnimationFrame(step);
  }
  step();
})();

// 关闭引导提示
function closeGuide(){
  document.getElementById('guideTip').style.display='none';
}

// 彩色正方形网格
const grid = document.querySelector('.dot-grid');
for(let i=0;i<150;i++){const d=document.createElement('div');d.className='dot';d.style.animationDelay=(i%10)*0.3+'s';grid.appendChild(d)}

// 加载逻辑
const MIN_LOAD=3000,start=Date.now();
const dots=['加载中.','加载中..','加载中...'];let dotIdx=0;
setInterval(()=>document.getElementById('loadingStep').textContent=dots[dotIdx++%3],400);
const progressTimer=setInterval(()=>{const p=Math.min(100,(Date.now()-start)/MIN_LOAD*100);document.getElementById('loadingProgress').style.width=p+'%'},30);

// 设置面板 - Fix 3: 点击设置同时关闭提示框
document.querySelector('.settings-btn').onclick=()=>{
  document.querySelector('.settings-panel').classList.toggle('show');
  closeGuide();
}
const multiRand=document.getElementById('multiRand');
const noRepeat=document.getElementById('noRepeat');
const pickCount=document.getElementById('pickCount');
const minus=document.getElementById('minus');
const plus=document.getElementById('plus');

multiRand.onclick=()=>multiRand.classList.toggle('on');
noRepeat.onclick=()=>noRepeat.classList.toggle('on');

// 全屏模式：电脑端自动全屏 + 设置开关 + 双向状态同步
const isDesktop = !/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) && window.matchMedia('(pointer:fine)').matches;
const fsToggle = document.getElementById('fullscreenToggle');

function isFullscreen(){
  return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
}
function enterFullscreen(){
  const el = document.documentElement;
  if (el.requestFullscreen) return el.requestFullscreen().catch(()=>{});
  if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
  if (el.msRequestFullscreen) return el.msRequestFullscreen();
}
function exitFullscreen(){
  if (document.exitFullscreen) return document.exitFullscreen().catch(()=>{});
  if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
  if (document.msExitFullscreen) return document.msExitFullscreen();
}
function syncFsUI(){
  const on = isFullscreen();
  if (on) fsToggle.classList.add('on'); else fsToggle.classList.remove('on');
}
function onFsChange(){ syncFsUI(); }
document.addEventListener('fullscreenchange', onFsChange);
document.addEventListener('webkitfullscreenchange', onFsChange);
document.addEventListener('msfullscreenchange', onFsChange);

fsToggle.addEventListener('click', () => {
  const wantOn = !fsToggle.classList.contains('on');
  // 只记录用户切换意图（真正的状态由后续 fullscreenchange 事件同步）
  if (wantOn) {
    enterFullscreen();
  } else {
    if (isFullscreen()) exitFullscreen();
  }
});

// 格式化数字 1-10
function formatNum(val){
  val = String(val).replace(/\D/g, '');
  if(val.startsWith('0') && val.length>1) val = val.replace(/^0+/, '');
  if(val==='' || isNaN(+val)) return 1;
  let n = parseInt(val,10);
  if(n<1) return 1;
  if(n>10) return 10;
  return n;
}

// 输入校验
pickCount.addEventListener('input',()=>{
  pickCount.value = String(pickCount.value).replace(/\D/g,'');
});

// 失去焦点：空→1
pickCount.addEventListener('blur',()=>{
  pickCount.value = formatNum(pickCount.value);
});

// 加减按钮
minus.addEventListener('click',()=>{
  let val = formatNum(pickCount.value)-1;
  pickCount.value = formatNum(val);
});
plus.addEventListener('click',()=>{
  let val = formatNum(pickCount.value)+1;
  pickCount.value = formatNum(val);
});

}

// 主程序
function initApp(){
  // Feature 1: 窗口变化时动态调整，不刷新
  let rt;
  window.addEventListener('resize',()=>{
    clearTimeout(rt);
    rt=setTimeout(()=>{ if (window._updateRendererSize) window._updateRendererSize(); }, 80);
  });
  const students=list.trim().split('\n').map(line=>{const [n,g]=line.split(',');return {name:n,gender:g.trim()};}).filter(Boolean);
  let usedNames=[];let mode='all';let hideTimer=null;

  const ui=document.querySelector('.ui-overlay');
  ui.innerHTML=`
    <div class="title">00老师课堂</div>
    <div class="center-name"><div id="selectedNameAnimator"></div></div>
    <div class="control-panel">
      <div class="mode-select">
        <button class="mode-btn mode-all active">全班</button>
        <button class="mode-btn mode-boy">只抽男生</button>
        <button class="mode-btn mode-girl">只抽女生</button>
      </div>
      <button class="action-btn" id="actionBtn">开始抽问</button>
      <div class="footer-info">当前模式：全班抽问 | 共49人</div>
    </div>
  `;

  const sel=document.getElementById('selectedNameAnimator');
  const btn=document.getElementById('actionBtn');
  const footer=document.querySelector('.footer-info');

  function clearName(){sel.classList.remove('animate-to-center');sel.textContent='';}
  function autoHide(){clearTimeout(hideTimer);hideTimer=setTimeout(clearName,5000);}

  document.querySelector('.mode-all').onclick=()=>{mode='all';act(0);footer.textContent='当前模式：全班抽问 | 共49人';}
  document.querySelector('.mode-boy').onclick=()=>{mode='boy';act(1);footer.textContent='当前模式：只抽男生 | 共23人';}
  document.querySelector('.mode-girl').onclick=()=>{mode='girl';act(2);footer.textContent='当前模式：只抽女生 | 共26人';}
  function act(i){document.querySelectorAll('.mode-btn').forEach((b,x)=>b.classList.toggle('active',x===i));}

  function getPool(){
    let p=students;
    if(mode==='boy')p=students.filter(s=>s.gender==='男');
    if(mode==='girl')p=students.filter(s=>s.gender==='女');
    if(noRepeat.classList.contains('on'))p=p.filter(s=>!usedNames.includes(s.name));
    if(p.length===0){usedNames=[];p=getPool();}
    return p;
  }

  const scene=new THREE.Scene();
  const cam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,200);
  cam.position.set(0,2,22);
  const rd=new THREE.WebGLRenderer({antialias:true,alpha:true});
  rd.setSize(innerWidth,innerHeight);
  document.getElementById('canvas-container').appendChild(rd.domElement);
  const lr=new THREE.CSS2DRenderer();
  lr.setSize(innerWidth,innerHeight);
  lr.domElement.style.cssText='position:absolute;top:0;left:0;pointer-events:none';
  document.getElementById('canvas-container').appendChild(lr.domElement);

  // Feature 1: resize 动态调整
  function updateRendererSize(){
    cam.aspect = innerWidth / innerHeight;
    cam.updateProjectionMatrix();
    rd.setSize(innerWidth, innerHeight);
    lr.setSize(innerWidth, innerHeight);
  }
  window._updateRendererSize = updateRendererSize;

  // 按窗口大小自适应计算球体半径 - 略大一些但不超出屏幕
  function calcRadius(){
    const base = Math.min(innerWidth, innerHeight);
    return Math.max(8, Math.min(14, base / 90));
  }

  const g=new THREE.Group();scene.add(g);
  let R = calcRadius();
  const phi=Math.PI*(3-Math.sqrt(5)), tags=[], tagPositions=[];
  students.forEach((s,i)=>{
    const y=1-(i/(students.length-1))*2;const r=Math.sqrt(1-y*y);const t=phi*i;
    const x=Math.cos(t)*r,z=Math.sin(t)*r;
    const d=document.createElement('div');d.className='name-tag';d.textContent=s.name;
    const o=new THREE.CSS2DObject(d);o.position.set(x*R,y*R,z*R);
    g.add(o);tags.push(o);tagPositions.push({x,y,z});
  });

  // Feature 2: 多重随机 - 初始化 + 后续持续可视化
  let shakeT = 0;
  let targetRotY = 0, targetRotX = 0;
  if(multiRand.classList.contains('on')){
    g.rotation.y=Math.random()*Math.PI*2;
    g.rotation.x=(Math.random()-0.5)*0.5;
    targetRotY = g.rotation.y;
    targetRotX = g.rotation.x;
  }

  let roll=false;
  const speed=0.15;

  btn.onclick=()=>{
    clearName();
    roll=!roll;
    btn.textContent=roll?'停止抽问':'开始抽问';
    if(!roll){
      const cnt = formatNum(pickCount.value);
      const pool=getPool();
      let res=[];
      let temp=[...pool];
      for(let i=0;i<cnt;i++){
        const idx=Math.floor(Math.random()*temp.length);
        res.push(temp[idx].name);
        if(noRepeat.classList.contains('on'))usedNames.push(temp[idx].name);
        temp.splice(idx,1);
      }

      if(cnt === 1){
        sel.textContent=res[0];
        sel.classList.add('animate-to-center');
        autoHide();
      }else{
        // Fix 1: 用 span 包裹，便于自动换行
        document.getElementById('resultNames').innerHTML =
          res.map(n => `<span>${n}</span>`).join('');
        document.getElementById('resultModal').style.display='flex';
      }

      // Feature 2: 抽完后再来一次明显随机转动
      if (multiRand.classList.contains('on')) {
        targetRotY = g.rotation.y + (Math.random() - 0.5) * Math.PI;
        targetRotX = (Math.random() - 0.5) * 0.8;
      }
    }
  };

  function ani(){
    requestAnimationFrame(ani);
    if(roll){
      g.rotation.y += speed;
      g.rotation.x += speed * 0.3;
    } else {
      if (multiRand.classList.contains('on')) {
        g.rotation.y += (targetRotY - g.rotation.y) * 0.03;
        g.rotation.x += (targetRotX - g.rotation.x) * 0.03;
        shakeT += 0.02;
        g.rotation.y += Math.sin(shakeT * 1.7) * 0.0008;
        g.rotation.x += Math.cos(shakeT * 1.3) * 0.0006;
      }
    }
    // Feature 1: 球体大小随窗口动态调整
    const curR = calcRadius();
    if (Math.abs(curR - R) > 0.01) {
      R = curR;
      tagPositions.forEach((p, i) => {
        tags[i].position.set(p.x * R, p.y * R, p.z * R);
      });
    }
    tags.forEach(t=>t.lookAt(cam.position));
    rd.render(scene,cam);lr.render(scene,cam);
  }
  ani();
}
