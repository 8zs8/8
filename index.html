<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>00老师课堂抽问 随机点名</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;user-select:none;-webkit-user-select:none}
    body{width:100vw;height:100vh;overflow:hidden;background:#03050a}
    #loading-screen{position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000814;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#00c3ff}
    .loading-text{font-size:clamp(1.2rem,4vw,2.2rem);text-shadow:0 0 10px #0088ff,0 0 20px #0044ff;margin-bottom:1.5rem}
    .loading-bar{width:clamp(200px,50vw,500px);height:14px;border:1px solid #00aaff;border-radius:8px;overflow:hidden;background:rgba(0,30,60,.5)}
    .loading-progress{height:100%;width:0%;background:linear-gradient(90deg,#0088ff,#00e5ff);transition:width .3s}
    .loading-step{margin-top:1rem;color:#80c8ff;font-size:1rem}
    #canvas-container{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2}
    .ui-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:clamp(1rem,3vw,2rem);pointer-events:none}
    .title{font-size:clamp(1.5rem,6vw,4rem);color:#c8eaff;text-shadow:0 0 10px #0099ff,0 0 20px #0055ff;border-bottom:2px solid rgba(64,224,255,.8);padding-bottom:.2em;text-align:center;text-transform:uppercase;letter-spacing:2px}
    .center-name{flex:1;display:flex;align-items:center;justify-content:center;width:100%;position:relative}
    #selectedNameAnimator{position:absolute;font-size:clamp(12px,2.5vw,16px);font-weight:600;color:#88cfff;text-shadow:0 0 8px cyan,0 0 12px #0077ff;opacity:0;transition:all 2.4s cubic-bezier(.2,.8,.2,1);z-index:100}
    #selectedNameAnimator.animate-to-center{font-size:clamp(6vw,12vw,16vw)!important;font-weight:900;color:#fff;text-shadow:0 0 20px cyan,0 0 35px #0066ff,0 0 50px #00aaff;left:50%!important;top:50%!important;transform:translate(-50%,-50%)!important;opacity:1}
    .control-panel{width:100%;max-width:800px;background:rgba(10,20,40,.8);backdrop-filter:blur(8px);border:1px solid rgba(0,200,255,.6);border-radius:clamp(20px,5vw,40px);padding:clamp(1rem,3vw,1.5rem);pointer-events:auto}
    .slider-wrapper{display:flex;align-items:center;gap:clamp(.5rem,1vw,1rem);margin-bottom:clamp(1rem,2vw,1.5rem)}
    .slider-label{font-size:clamp(1rem,2vw,1.4rem);font-weight:600;color:#b2e6ff;text-shadow:0 0 3px #0066ff;min-width:clamp(2rem,5vw,3rem);text-align:center;white-space:nowrap}
    .slider-label:first-child{color:#88ddff}
    .slider-label:last-child{color:#fff;font-weight:800;text-shadow:0 0 8px cyan}
    input[type="range"]{-webkit-appearance:none;flex:1;height:14px;background:#0a3460;border-radius:20px;border:1px solid #7fd6ff;box-shadow:0 0 10px 1px #0099ff;min-width:100px}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:clamp(20px,4vw,28px);height:clamp(20px,4vw,28px);background:#fff;border-radius:50%;border:3px solid #00d0ff;box-shadow:0 0 15px cyan}
    .mode-select{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:15px}
    .mode-btn{padding:10px;border-radius:12px;border:2px solid #00ccff;background:rgba(0,80,120,.5);color:#fff;font-weight:bold;font-size:16px;cursor:pointer}
    .mode-btn.active{background:#0099ff;border-color:#fff}
    .action-btn{width:100%;padding:clamp(.8rem,3vw,1.2rem);font-size:clamp(1.2rem,5vw,2rem);font-weight:800;color:#dbf9ff;text-shadow:0 0 15px #0af;background:rgba(0,50,80,.5);border:3px solid #00ccff;border-radius:clamp(30px,8vw,60px);cursor:pointer;box-shadow:0 0 20px #00a6ff,inset 0 0 15px #0088cc;text-transform:uppercase;letter-spacing:2px}
    .name-tag{font-size:clamp(12px,2.5vw,16px);font-weight:600;color:#88cfff;text-shadow:0 0 6px cyan;background:rgba(0,10,30,.7);padding:2px 6px;border-radius:15px;border:1px solid rgba(64,224,255,.6);white-space:nowrap;pointer-events:none}
    .footer-info{font-size:clamp(.8rem,2vw,1.1rem);color:#9dc9ff;text-align:center;margin-top:.5rem;opacity:.8}
  </style>
</head>
<body>
<div id="loading-screen">
  <div class="loading-text">初始化点名系统</div>
  <div class="loading-bar">
    <div class="loading-progress" id="loadingProgress"></div>
  </div>
  <div class="loading-step" id="loadingStep">加载中...</div>
</div>
<div id="canvas-container" style="display:none;"></div>
<div class="ui-overlay" style="display:none;"></div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if((e.ctrlKey && e.key==='u') || (e.ctrlKey && e.shiftKey && e.key==='i') || e.key==='F12'){
    e.preventDefault();
  }
});
const loadingProgress = document.getElementById('loadingProgress');
const loadingStep = document.getElementById('loadingStep');
const loadingScreen = document.getElementById('loading-screen');
const canvasContainer = document.getElementById('canvas-container');
const uiOverlay = document.querySelector('.ui-overlay');
function updateLoading(step, text, per){
  loadingStep.textContent = `${step}：${text}`;
  loadingProgress.style.width = per + '%';
}
const EXPECTED_SHA256 = "81ec162e25dc6b195582ae4bf9fc62bf4f6c83f10a7b53aa6e8a08a25f0e99bc";
const rawNames = `陈泓睿,男
陈建业,男
陈雨钒,男
邓可妍,女
邓晓彰,女
郭瑾萱,女
何丞杰,男
何弘彬,男
何金霖,女
何乐瑶,女
何泰燃,男
何芷莹,女
黄可蓝,女
黄紫涵,女
劳晓晴,女
劳梓谦,男
李睿诚,男
李思亭,女
李栩婷,女
梁思璐,女
梁炜晋,男
梁倚彤,女
林晨菲,女
林剑涛,男
林若曦,女
林诗悦,女
林毅泳,男
林紫瑶,女
刘辰铭,男
楼应铖,男
罗淳蓝,女
罗晓娜,女
马健朗,男
麦耀桦,男
庞嘉,女
彭璐,女
秦嘉骏,男
谭嘉烨,女
文俊锋,男
吴恩哲,男
肖童,女
谢昊晋,男
谢彤彤,女
徐绰延,男
徐铭浩,男
杨佳祺,女
袁梓豪,男
张嘉荣,男
张紫淇,女`;
async function sha256(text){
  const bytes = new TextEncoder().encode(text.trim());
  const hash = await crypto.subtle.digest("SHA-256", bytes);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
(async ()=>{
  updateLoading("加载中",666);
  const currentHash = await sha256(rawNames);
  if(currentHash!==EXPECTED_SHA256){
    alert("学生名单已被篡改！");
    return;
  }
  updateLoading("加载中.",666);
  updateLoading("加载中..",666);
  const script = document.createElement('script');
  script.src = "app.js";
  script.onload = ()=>{
    updateLoading("加载中...",666);
    setTimeout(()=>{
      loadingScreen.style.display = "none";
      canvasContainer.style.display = "block";
      uiOverlay.style.display = "flex";
      initApp();
    },500);
  };
  document.body.appendChild(script);
})();
</script>
</body>
</html>
