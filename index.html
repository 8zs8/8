<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片循环播放</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
        }
        /* 轮播容器占满全屏 */
        .slider {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        /* 图片淡入淡出动画 */
        .slide-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease;
            object-fit: contain;
        }
        .slide-item.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="slider" id="sliderWrap">
        <img class="slide-item active" src="https://8zs8.github.io/cdn/college1-file-by-prash/college1.jpg" alt="校园图1">
        <img class="slide-item" src="https://8zs8.github.io/cdn/college1-file-by-prash/college2.jpg" alt="校园图2">
        <img class="slide-item" src="https://8zs8.github.io/cdn/college1-file-by-prash/college3.jpg" alt="校园图3">
        <img class="slide-item" src="https://8zs8.github.io/cdn/college1-file-by-prash/college4.jpg" alt="校园图4">
    </div>

    <script>
        const slides = document.querySelectorAll('.slide-item');
        const sliderWrap = document.getElementById('sliderWrap');
        let currentIndex = 0;
        const total = slides.length;

        // 切换图片逻辑
        function changeSlide() {
            slides[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % total;
            slides[currentIndex].classList.add('active');
        }

        // 3000毫秒自动切换
        setInterval(changeSlide, 3000);

        // 双击全屏/退出全屏
        sliderWrap.addEventListener('dblclick', () => {
            if (!document.fullscreenElement) {
                sliderWrap.requestFullscreen().catch(err => {
                    console.log('全屏开启失败：', err);
                });
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
